    <title>Quiz-app</title>
    <link href="task5.css" rel="stylesheet" />

    <!-- main app -->
    <div class="app">

      <!-- quiz section -->
      <div class="quiz">

        <h2 id="question">All questions</h2>

        <button id="next-btn">Next</button>

    </div>

    <script src="task5.js"></script>
